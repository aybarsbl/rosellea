# Container içinde varsayılan ALSA cihazı: USB PnP Audio Device (kart 2).
# 'plug' PCM otomatik rate/format dönüşümü yapar — pyaudio 16 kHz mono
# istemesine rağmen device native 48 kHz olabilir, plug bunu çözer.

pcm.!default {
    type asym
    playback.pcm {
        type plug
        slave.pcm "hw:2,0"
    }
    capture.pcm {
        type plug
        slave.pcm "hw:2,0"
        # Cihaz stereo (FL,FR fixed) ama pyaudio mono açıyor — varsayılan
        # plug davranışı sadece FL kanalını alır. "average" iki kanalı toplar
        # ve böler, böylece sinyalin yarısını kaybetmeyiz.
        route_policy "average"
    }
}

ctl.!default {
    type hw
    card 2
}
