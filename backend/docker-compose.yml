services:
  postgres:
    image: postgres:17-alpine
    container_name: psycopg3
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d database"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE: postgresql://user:password@127.0.0.1:5432/database
    network_mode: host
    privileged: true
    group_add:
      - audio
      - video
      - render
    devices:
      - /dev/snd:/dev/snd
      - /dev/i2c-1:/dev/i2c-1
      - /dev/gpiomem:/dev/gpiomem
    volumes:
      - ./data:/app/data
      - ./asound.conf:/etc/asound.conf:ro
      - /var/run/dbus:/var/run/dbus
      - /run/dbus:/run/dbus
      - /run/udev:/run/udev:ro
      - /etc/resolv.conf:/etc/resolv.conf:ro
      # adafruit-blinka Pi modelini /sys/firmware/devicetree veya /proc/cpuinfo
      # üzerinden tespit eder. /sys mount edilmeden "platform desteklenmiyor"
      # tarzı hataya düşer.
      - /sys:/sys
      - /proc/device-tree:/proc/device-tree:ro

volumes:
  postgres_data:
